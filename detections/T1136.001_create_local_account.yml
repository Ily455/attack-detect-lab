title: Local Account Creation T1136.001
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: experimental
description: Detects local account creation via useradd or adduser — MITRE ATT&CK T1136.001.
references:
  - https://attack.mitre.org/techniques/T1136/001/
author: Ilyass El Annid
date: 2026-06-03
tags:
  - attack.persistence
  - attack.t1136.001
logsource:
  product: linux
  service: auditd
detection:
  selection:
    type: EXECVE
    a0|contains:
      - 'useradd'
      - 'adduser'
  condition: selection
falsepositives:
  - Legitimate user provisioning by administrators
  - System package installation creating service accounts
level: medium
